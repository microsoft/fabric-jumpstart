logical_id: hochschul-insights
name: Hochschul-Insights (German Higher Education)
description: >-
  End-to-end analytics on German higher-education data from DESTATIS GENESIS:
  students, staff, third-party funding — 10 fact + 6 dimension tables, Direct
  Lake semantic model, 8-page IBCS Power BI report with an Azure Map of all
  422 Hochschulen, plus a Data Agent. Bundled snapshot; live refresh optional
  via a free DESTATIS token.
