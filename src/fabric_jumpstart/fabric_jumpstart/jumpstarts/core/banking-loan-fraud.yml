mermaid_diagram: |
  graph LR

    %% External producer — the emulator notebook runs in the workspace but
    %% acts as a synthetic data source, posting JSON events to the
    %% Eventstream's CustomEndpoint over the Event Hub protocol. We show it
    %% outside the workspace box to mirror how producers are drawn elsewhere.
    EMU[BankingLoanFraudEmulator]:::U1F3E6

    %% Fabric workspace — the deployed RTI stack
    subgraph Fabric:::Workspace
      direction LR

      ES[BankingLoanFraudStream]:::Eventstream
      EH[DemosEH]:::Eventhouse
      KDB[BankingLoanFraud]:::KQLDatabase
      DASH[BankingLoanFraudDashboard]:::KQLDashboard
    end

    %% Producer → Eventstream CustomEndpoint
    EMU -.-> ES

    %% Eventstream lands events in the KQL DB hosted by the Eventhouse
    ES --> EH
    EH --> KDB

    %% Dashboard reads from the KQL database
    KDB --> DASH