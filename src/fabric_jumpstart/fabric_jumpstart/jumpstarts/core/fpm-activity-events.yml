mermaid_diagram: |
  graph LR

    subgraph Fabric:::Workspace
      direction LR

      NB_SETUP[Activity Events Setup]:::Notebook
      VL[Fabric Platform Monitoring]:::VariableLibrary

      DP[Refresh Activity Events]:::DataPipeline --> NB_EXTRACT[Monitoring Activity Events]:::Notebook

      EH[Fabric Platform Monitoring]:::Eventhouse
      KDB[Activity Events]:::KQLDatabase

      DASH[Platform Activities]:::KQLDashboard
    end

    %% Setup writes Kusto URIs and Key Vault references to the VariableLibrary.
    NB_SETUP -.-> VL

    %% Pipeline reads VariableLibrary values and forwards notebook parameters.
    VL -.-> DP

    %% Extractor queues ingestion into ActivityEventsRaw; update policy parses it.
    NB_EXTRACT --> KDB
    EH --- KDB

    %% Dashboard reads ActivityEvents plus functions and materialized views.
    KDB --> DASH
