name: Fabric Platform Monitoring - Capacity Events
description: >-
  Monitor your Fabric capacity utilization in real-time using Capacity Events.
  Ingest capacity telemetry into an Eventhouse via Eventstream and visualize
  resource consumption trends on live KQL dashboards for proactive management.
