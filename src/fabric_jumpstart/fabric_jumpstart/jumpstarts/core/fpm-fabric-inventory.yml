  repo_ref: v0.2.3
  workspace_path: fabric-inventory/src/
items_in_scope:
- Notebook
- Eventhouse
- KQLDatabase
- KQLDashboard
- DataPipeline
- VariableLibrary
jumpstart_docs_uri: ''
