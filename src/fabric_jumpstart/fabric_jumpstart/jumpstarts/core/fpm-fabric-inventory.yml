video_url: ""
difficulty: Beginner
last_updated: "2026-02-03"
mermaid_diagram: |
  graph LR

    %% Monitoring backbone deployed in the Fabric workspace
    subgraph Fabric:::Workspace
      direction LR

      NB_SETUP[Fabric Inventory Setup]:::Notebook
      VL[Fabric Platform Monitoring]:::VariableLibrary

      DP_INV[Refresh Inventory]:::DataPipeline --> NB_INV[Monitoring Extraction Inventory]:::Notebook
      DP_SCN[Refresh Scanner API]:::DataPipeline --> NB_SCN[Monitoring Extraction Scanner]:::Notebook
      DP_REF[Refresh Refreshables]:::DataPipeline --> NB_REF[Monitoring Extraction Refreshables]:::Notebook

      EH[Fabric Platform Monitoring]:::Eventhouse
      KDB[Platform Inventory]:::KQLDatabase
      DASH[Platform Monitoring]:::KQLDashboard
    end

    %% Setup writes Kusto URIs + Key Vault refs into the variable library
    NB_SETUP -.-> VL

    %% Library variables parameterize every pipeline run
    VL -.-> DP_INV
    VL -.-> DP_SCN
    VL -.-> DP_REF

    %% Ingest → KQL DB via direct streaming/queued ingestion
    NB_INV --> KDB
    NB_SCN --> KDB
    NB_REF --> KDB

    %% Eventhouse hosts the KQL DB
    EH --- KDB

    %% Consumption — the real-time dashboard reads from the KQL DB
    KDB --> DASH