id: 11
logical_id: fpm-fabric-inventory
name: Fabric Platform Monitoring - Fabric Inventory
description: >-
  Extract and catalog your entire Fabric tenant inventory in a semi-structured
  format for comprehensive visibility. Three pipeline-scheduled notebooks pull
  from the Fabric Admin REST API into an Eventhouse-backed KQL database fronted
  by a real-time dashboard.
date_added: 03/15/2026
workload_tags:
- Real-Time Intelligence
- Data Factory
