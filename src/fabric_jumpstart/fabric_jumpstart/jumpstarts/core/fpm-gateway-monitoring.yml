mermaid_diagram: |
  graph LR

    %% External gateway host and local logs stay outside the Fabric workspace.
    LOGS[Gateway Log Files]:::U1F4C4
    GW[Gateway PowerShell Uploader]:::U1F5A5

    subgraph Fabric:::Workspace
      direction LR

      NB_SETUP[Gateway Monitoring Setup]:::Notebook

      ES_HB[GatewayMonitoringHeartbeat]:::Eventstream
      ES_RPT[GatewayMonitoringReports]:::Eventstream

      EH[Fabric Platform Monitoring]:::Eventhouse
      KDB[Gateway Monitoring]:::KQLDatabase

      SM[Gateway Monitoring]:::SemanticModel
      RPT[Gateway Monitoring]:::Report
    end

    %% Setup notebook generates config.json with the Eventstream connection strings.
    NB_SETUP -.-> GW

    %% Runtime telemetry flow.
    LOGS --> GW
    GW -.-> ES_HB
    GW -.-> ES_RPT
    ES_HB --> EH
    ES_RPT --> EH
    EH --> KDB
    KDB --> SM
    SM --> RPT
