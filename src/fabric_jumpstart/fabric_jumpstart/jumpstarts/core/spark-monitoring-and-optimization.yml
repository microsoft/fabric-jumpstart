      DASH[Spark Monitoring Dashboard]:::KQLDashboard
      DA[Fabric Spark Advisor]:::DataAgent

      DP_REC[Spark Recommender Pipeline]:::DataPipeline --> NB_REC[Spark Monitoring Recommedations]:::Notebook
    end

    %% Spark workloads emit events to the stream after the setup notebook
    %% has wired their Spark Environments to the Eventstream's IngestionEndpoint.
