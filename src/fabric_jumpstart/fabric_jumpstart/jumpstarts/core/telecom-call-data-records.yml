mermaid_diagram: |
  graph LR

    %% Synthetic CDR producer — the TelecomCallDataRecordsEmulator notebook
    %% is itself a deployed Fabric item, but conceptually it plays the role
    %% of the external mobile-network producer. Shown outside for clarity.
    SRC[Mobile Network CDRs]:::U1F4F1

    %% Fabric workspace items deployed by the jumpstart
    subgraph Fabric:::Workspace
      direction LR

      EM[TelecomCallDataRecordsEmulator]:::Notebook
      ES[TelecomCallDataRecordsStream]:::Eventstream
      EH[DemosEH]:::Eventhouse
      KDB[TelecomCallDataRecords]:::KQLDatabase
      KD[TelecomCallDataRecordsDashboard]:::KQLDashboard
    end

    %% Producer → emulator notebook (the notebook stands in for the network)
    SRC -.-> EM

    %% Emulator sends events to the Eventstream's CustomEndpoint-Source
    EM --> ES

    %% Eventstream lands rows in the cdr_raw table via DirectIngestion
    ES --> EH
    EH --> KDB

    %% Dashboard queries the KQL database (cdr_raw)
    KDB --> KD